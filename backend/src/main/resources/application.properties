spring.application.name=clinicapp

spring.datasource.url=jdbc:mysql://localhost:3306/clinic_app_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

server.port=${SERVER_PORT:8085}

app.jwt.secret=${APP_JWT_SECRET:docnest-dev-jwt-secret-key-change-in-production-2026-minimum-32-bytes}
app.jwt.expiration-ms=${APP_JWT_EXPIRATION_MS:86400000}

# File upload configuration
app.upload.dir=uploads
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

# Groq AI for medical intake summarization
app.groq.api-key=${GROQ_API_KEY:your-groq-api-key-here}

# Spring AI configuration sample for production use.
# spring.ai.openai.api-key=${OPENAI_API_KEY}
# spring.ai.openai.chat.options.model=gpt-4o-mini
# spring.ai.openai.embedding.options.model=text-embedding-3-small

# ── Email (SMTP) Configuration ───────────────────────────────────────────────
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# ── Notification Toggles ─────────────────────────────────────────────────────
app.notifications.email.enabled=${EMAIL_ENABLED:false}
app.notifications.sms.enabled=${SMS_ENABLED:false}

# ── Razorpay Payment Configuration ───────────────────────────────────────────
app.razorpay.key-id=${RAZORPAY_KEY_ID:rzp_test_stub}
app.razorpay.key-secret=${RAZORPAY_KEY_SECRET:stub_secret}
app.payment.enabled=${PAYMENT_ENABLED:false}
