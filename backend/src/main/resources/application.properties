spring.application.name=clinicapp

spring.datasource.url=jdbc:mysql://localhost:3306/clinic_app_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

server.port=${SERVER_PORT:8085}

app.jwt.secret=${APP_JWT_SECRET:docnest-dev-jwt-secret-key-change-in-production-2026-minimum-32-bytes}
app.jwt.expiration-ms=${APP_JWT_EXPIRATION_MS:86400000}

# Groq AI for medical intake summarization
app.groq.api-key=${GROQ_API_KEY:your-groq-api-key-here}

