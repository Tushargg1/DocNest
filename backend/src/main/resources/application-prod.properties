# ─── Production Profile ───────────────────────────────────────────────────────
# Activated via: SPRING_PROFILES_ACTIVE=prod

spring.application.name=clinicapp

# ─── Database (Hosted MySQL: Railway, PlanetScale, Aiven, etc.) ──────────────
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Use 'validate' in prod — migrations should be handled separately
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# ─── Connection Pool (HikariCP) ─────────────────────────────────────────────
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=600000
spring.datasource.hikari.connection-timeout=20000

# ─── Server ──────────────────────────────────────────────────────────────────
server.port=${PORT:8085}

# ─── JWT ─────────────────────────────────────────────────────────────────────
app.jwt.secret=${APP_JWT_SECRET}
app.jwt.expiration-ms=${APP_JWT_EXPIRATION_MS:86400000}

# ─── File Uploads ────────────────────────────────────────────────────────────
app.upload.dir=uploads
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

# ─── AI / Groq ──────────────────────────────────────────────────────────────
app.groq.api-key=${GROQ_API_KEY:disabled}

# ─── Email (SMTP) ───────────────────────────────────────────────────────────
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# ─── Notification Toggles ───────────────────────────────────────────────────
app.notifications.email.enabled=${EMAIL_ENABLED:false}
app.notifications.sms.enabled=${SMS_ENABLED:false}

# ─── Razorpay Payments ──────────────────────────────────────────────────────
app.razorpay.key-id=${RAZORPAY_KEY_ID:disabled}
app.razorpay.key-secret=${RAZORPAY_KEY_SECRET:disabled}
app.payment.enabled=${PAYMENT_ENABLED:false}

# ─── Disable Dev Features ───────────────────────────────────────────────────
app.seeder.enabled=false
logging.level.root=INFO
logging.level.com.doctpjt=INFO
logging.level.org.hibernate.SQL=WARN
